name: Agency News Talk Briefing Kakao Post via MCP

run-name: Agency News Talk Briefing Kakao Post via MCP - ${{ github.event.inputs.trigger_source || github.event.inputs.agency || github.event.inputs.agency_index || 'auto' }}

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: "실행 출처 표시용 값입니다. 예: pc-scheduler-0807"
        required: false
        default: ""
      agency_index:
        description: "기관 순번입니다. auto이면 현재 KST 시각에 맞는 기관을 선택합니다."
        required: false
        default: "auto"
      agency:
        description: "기관명을 직접 지정할 때 사용합니다. 예: 병무청"
        required: false
        default: ""
      target_date:
        description: "뉴스 기준일 YYYY-MM-DD. 비워두면 KST 기준 전날입니다."
        required: false
        default: ""
      send_summary:
        description: "카카오톡에 뉴스 요약 본문을 보냅니다."
        type: boolean
        required: false
        default: true
      send_podcast:
        description: "카카오톡에 음성요약 듣기 링크를 따로 보냅니다."
        type: boolean
        required: false
        default: true
      include_weather_in_summary:
        description: "본문 요약 첫부분에 선택 기관 지역 날씨를 넣습니다."
        type: boolean
        required: false
        default: true
      archive_results:
        description: "요약과 음성 파일을 repository에 커밋합니다."
        type: boolean
        required: false
        default: true
      send_image:
        description: "카카오톡에 기사 대표 이미지 합본을 첨부합니다."
        type: boolean
        required: false
        default: true
      target_chatroom:
        description: "테스트용 채팅방 이름입니다. 비우면 Repository variable TARGET_CHATROOM을 사용합니다."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  post:
    runs-on: [self-hosted, Windows, X64, kakao, qwerty]
    timeout-minutes: 30
    concurrency:
      group: daily-agency-news-kakao-post
      cancel-in-progress: false
    env:
      PYTHON_EXE: ${{ vars.PYTHON_EXE || 'C:\Users\April\.cache\codex-runtimes\codex-primary-runtime\dependencies\python\python.exe' }}
      TARGET_DATE_INPUT: ${{ github.event.inputs.target_date }}
    steps:
      - uses: actions/checkout@v4

      - name: Select agency and test target
        id: agency
        shell: powershell
        env:
          AGENCY_INDEX_INPUT: ${{ github.event.inputs.agency_index }}
          AGENCY_NAME_INPUT: ${{ github.event.inputs.agency }}
          TRIGGER_SOURCE_INPUT: ${{ github.event.inputs.trigger_source }}
          INCLUDE_WEATHER_INPUT: ${{ github.event.inputs.include_weather_in_summary }}
          TARGET_DATE_INPUT: ${{ github.event.inputs.target_date }}
        run: |
          $ErrorActionPreference = "Stop"
          $schedule = Get-Content -Path "config\agency_schedule.json" -Raw -Encoding UTF8 | ConvertFrom-Json
          $agencies = @($schedule.agencies)
          if ($agencies.Count -eq 0) {
            throw "config\agency_schedule.json에 기관 목록이 없습니다."
          }

          $agencyInput = "$env:AGENCY_NAME_INPUT".Trim()
          $indexInput = "$env:AGENCY_INDEX_INPUT".Trim()
          $selectedIndex = -1
          $cronAgencyName = ""
          $cronWeatherLocation = ""
          $cronWeatherLatitude = ""
          $cronWeatherLongitude = ""

          if (![string]::IsNullOrWhiteSpace($agencyInput)) {
            for ($i = 0; $i -lt $agencies.Count; $i++) {
              if ($agencies[$i].agency -eq $agencyInput) {
                $selectedIndex = $i
                break
              }
            }
            if ($selectedIndex -lt 0) {
              throw "기관명을 찾지 못했습니다: $agencyInput"
            }
          } elseif (![string]::IsNullOrWhiteSpace($indexInput) -and $indexInput -ne "auto") {
            $selectedIndex = [int]$indexInput
            $selectedIndex = (($selectedIndex % $agencies.Count) + $agencies.Count) % $agencies.Count
          } else {
            $kst = [System.TimeZoneInfo]::FindSystemTimeZoneById("Korea Standard Time")
            $nowKst = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $kst)
            $hour = [int]$nowKst.Hour
            for ($i = 0; $i -lt $agencies.Count; $i++) {
              if ([int]$agencies[$i].kst_hour -eq $hour) {
                $selectedIndex = $i
                break
              }
            }
            if ($selectedIndex -lt 0) {
              $selectedIndex = $hour % $agencies.Count
            }
          }

          if ($selectedIndex -ge 0) {
            $selected = $agencies[$selectedIndex]
            $agencyName = [string]$selected.agency
            $weatherLocation = [string]$selected.weather_location
            $weatherLatitude = [string]$selected.weather_latitude
            $weatherLongitude = [string]$selected.weather_longitude
            $selectedQueryTerms = @($selected.query_terms)
            $selectedRequiredTerms = @($selected.required_terms)
          } elseif (![string]::IsNullOrWhiteSpace($cronAgencyName)) {
            $agencyName = $cronAgencyName
            $weatherLocation = $cronWeatherLocation
            $weatherLatitude = $cronWeatherLatitude
            $weatherLongitude = $cronWeatherLongitude
            $selectedQueryTerms = @()
            $selectedRequiredTerms = @()
          } else {
            throw "No agency target was selected."
          }
          $triggerSource = "$env:TRIGGER_SOURCE_INPUT".Trim()
          if ([string]::IsNullOrWhiteSpace($triggerSource)) {
            $triggerSource = "manual-dispatch"
          }
          $agencySlug = ($agencyName -replace "[^\p{L}\p{Nd}]+", "-").Trim("-")
          if ([string]::IsNullOrWhiteSpace($agencySlug)) {
            $agencySlug = "agency-$selectedIndex"
          }

          if ([string]::IsNullOrWhiteSpace($env:TARGET_DATE_INPUT)) {
            $kst = [System.TimeZoneInfo]::FindSystemTimeZoneById("Korea Standard Time")
            $nowKst = [System.TimeZoneInfo]::ConvertTimeFromUtc([DateTime]::UtcNow, $kst)
            $targetDate = $nowKst.Date.AddDays(-1).ToString("yyyy-MM-dd")
          } else {
            $targetDate = $env:TARGET_DATE_INPUT.Trim()
          }

          $episodeId = "$targetDate-$agencySlug"
          $queryTerms = if ($selectedQueryTerms.Count -gt 0) { [string]::Join(",", $selectedQueryTerms) } else { $agencyName }
          $requiredTerms = if ($selectedRequiredTerms.Count -gt 0) { [string]::Join(",", $selectedRequiredTerms) } else { $agencyName }
          $includeWeather = if ("$env:INCLUDE_WEATHER_INPUT".Trim().ToLowerInvariant() -eq "false") { "false" } else { "true" }

          $envLines = @(
            "AGENCY_INDEX=$selectedIndex",
            "AGENCY_NAME=$agencyName",
            "AGENCY_SLUG=$agencySlug",
            "EPISODE_ID=$episodeId",
            "TARGET_DATE_RESOLVED=$targetDate",
            "NEWS_QUERY_TERMS=$queryTerms",
            "NEWS_REQUIRED_TERMS=$requiredTerms",
            "TRIGGER_SOURCE=$triggerSource",
            "WEATHER_ENABLED=$includeWeather",
            "WEATHER_LOCATION=$weatherLocation",
            "WEATHER_LATITUDE=$weatherLatitude",
            "WEATHER_LONGITUDE=$weatherLongitude"
          )
          foreach ($line in $envLines) {
            Add-Content -Path $env:GITHUB_ENV -Value $line -Encoding UTF8
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "agency=$agencyName" -Encoding UTF8
          Add-Content -Path $env:GITHUB_OUTPUT -Value "agency_index=$selectedIndex" -Encoding UTF8
          Add-Content -Path $env:GITHUB_OUTPUT -Value "episode_id=$episodeId" -Encoding UTF8
          Add-Content -Path $env:GITHUB_OUTPUT -Value "target_date=$targetDate" -Encoding UTF8
          Add-Content -Path $env:GITHUB_OUTPUT -Value "trigger_source=$triggerSource" -Encoding UTF8

          Write-Host "Selected agency: $agencyName"
          Write-Host "Selected agency index: $selectedIndex"
          Write-Host "Trigger source: $triggerSource"
          Write-Host "Target date: $targetDate"
          Write-Host "Episode id: $episodeId"
          Write-Host "Weather location: $weatherLocation"

      - name: Verify local Python
        shell: powershell
        run: '& $env:PYTHON_EXE --version'

      - name: Install dependencies
        shell: powershell
        run: |
          & $env:PYTHON_EXE -m pip install --upgrade pip
          & $env:PYTHON_EXE -m pip install -r requirements.txt
          & $env:PYTHON_EXE -m pip install "git+https://github.com/kronenz/kakaotalk-mcp.git@master"

      - name: Build Naver news summary
        shell: powershell
        env:
          SUMMARY_PROVIDER: ${{ vars.SUMMARY_PROVIDER || 'codex' }}
          CODEX_COMMAND: ${{ vars.CODEX_COMMAND || 'C:\Users\April\AppData\Roaming\npm\codex.cmd' }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL || '' }}
          CODEX_TIMEOUT_SECONDS: ${{ vars.CODEX_TIMEOUT_SECONDS || '300' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          NAVER_NEWS_ENABLED: "true"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_NEWS_PAGES: ${{ vars.NAVER_NEWS_PAGES || '5' }}
          GOOGLE_NEWS_ENABLED: "false"
          POLICY_RSS_ENABLED: "false"
          KSKILL_PROXY_BASE_URL: ${{ vars.KSKILL_PROXY_BASE_URL || 'https://k-skill-proxy.nomadamas.org' }}
        run: |
          $summaryPath = Join-Path "runs" "summary-$env:EPISODE_ID.md"
          $argsList = @(
            "-m", "kakao_mma_news",
            "--dry-run",
            "--date", "$env:TARGET_DATE_RESOLVED",
            "--output", "$summaryPath"
          )
          & $env:PYTHON_EXE @argsList

      - name: Build article image sheet
        shell: powershell
        run: |
          $articlesPath = Join-Path "runs" "articles-$env:TARGET_DATE_RESOLVED.json"
          $summaryPath = Join-Path "runs" "summary-$env:EPISODE_ID.md"
          $selectedArticlesPath = Join-Path "runs" "articles-$env:EPISODE_ID-selected.json"
          $imagePath = Join-Path "runs" "news-image-$env:EPISODE_ID.png"
          if (!(Test-Path $articlesPath)) {
            throw "No article JSON file found: $articlesPath"
          }
          if (!(Test-Path $summaryPath)) {
            throw "No summary Markdown file found: $summaryPath"
          }
          & $env:PYTHON_EXE scripts/filter_articles_by_summary_sources.py --articles "$articlesPath" --summary "$summaryPath" --output "$selectedArticlesPath"
          & $env:PYTHON_EXE scripts/build_news_image_sheet.py --articles "$selectedArticlesPath" --output "$imagePath" --date "$env:TARGET_DATE_RESOLVED" --agency "$env:AGENCY_NAME" --limit 10

      - name: Build podcast audio
        shell: powershell
        env:
          TTS_PROVIDER: ${{ vars.TTS_PROVIDER || 'edge' }}
          TTS_VOICE: ${{ vars.TTS_VOICE || 'ko-KR-SunHiNeural' }}
          TTS_RATE: ${{ vars.TTS_RATE || '+0%' }}
          TTS_PITCH: ${{ vars.TTS_PITCH || '+0Hz' }}
          TTS_TARGET_MINUTES: ${{ vars.TTS_TARGET_MINUTES || '5' }}
          PODCAST_BASE_URL: ${{ vars.PODCAST_BASE_URL || format('https://{0}.github.io/{1}/podcast/', github.repository_owner, github.event.repository.name) }}
          PODCAST_LISTEN_URL_TEMPLATE: ${{ vars.PODCAST_LISTEN_URL_TEMPLATE || '' }}
        run: |
          $summaryPath = Join-Path "runs" "summary-$env:EPISODE_ID.md"
          if (!(Test-Path $summaryPath)) {
            throw "No summary Markdown file found: $summaryPath"
          }
          & $env:PYTHON_EXE scripts/build_podcast_audio.py --date "$env:TARGET_DATE_RESOLVED" --episode-id "$env:EPISODE_ID" --summary "$summaryPath" --site-base-url "$env:PODCAST_BASE_URL" --target-minutes "$env:TTS_TARGET_MINUTES"
          if ([string]::IsNullOrWhiteSpace($env:PODCAST_LISTEN_URL_TEMPLATE)) {
            $listenUrl = $env:PODCAST_BASE_URL.TrimEnd("/") + "/?date=$env:EPISODE_ID"
          } else {
            $listenUrl = $env:PODCAST_LISTEN_URL_TEMPLATE.Replace("{date}", $env:EPISODE_ID)
          }
          $messagePath = Join-Path "runs" "podcast-message-$env:EPISODE_ID.txt"
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          $targetDate = [datetime]::ParseExact($env:TARGET_DATE_RESOLVED, "yyyy-MM-dd", [Globalization.CultureInfo]::InvariantCulture)
          $dateLabel = "$($targetDate.Year)$([char]0xB144) $($targetDate.Month)$([char]0xC6D4) $($targetDate.Day)$([char]0xC77C)"
          $labelSuffix = [System.Text.Encoding]::UTF8.GetString([Convert]::FromBase64String("64m07IqkIEFJIOydjOyEseyalOyVvSDrk6PquLA="))
          $label = [char]::ConvertFromUtf32(0x1F3A7) + $dateLabel + " " + $env:AGENCY_NAME + " " + $labelSuffix
          [System.IO.File]::WriteAllText($messagePath, "$label`n$listenUrl", $utf8NoBom)

      - name: Archive summary to repository
        if: ${{ github.event.inputs.archive_results == 'true' }}
        shell: powershell
        run: |
          $summaryPath = Join-Path "runs" "summary-$env:EPISODE_ID.md"
          if (!(Test-Path $summaryPath)) {
            throw "No summary Markdown file found: $summaryPath"
          }
          $summary = Get-Item -LiteralPath $summaryPath
          New-Item -ItemType Directory -Force -Path summaries | Out-Null
          $archivePath = Join-Path "summaries" $summary.Name
          Copy-Item -LiteralPath $summary.FullName -Destination $archivePath -Force
          $podcastAudio = Join-Path "podcast\audio" "$env:EPISODE_ID.mp3"
          $podcastScript = Join-Path "podcast\scripts" "$env:EPISODE_ID.txt"
          $podcastManifest = "podcast\manifest.json"
          foreach ($path in @($podcastAudio, $podcastScript, $podcastManifest)) {
            if (!(Test-Path $path)) {
              throw "Archive input was not found: $path"
            }
          }

          $tempDir = Join-Path $env:RUNNER_TEMP "archive-$env:EPISODE_ID"
          New-Item -ItemType Directory -Force -Path $tempDir | Out-Null
          Copy-Item -LiteralPath $summary.FullName -Destination (Join-Path $tempDir $summary.Name) -Force
          Copy-Item -LiteralPath $podcastAudio -Destination (Join-Path $tempDir "$env:EPISODE_ID.mp3") -Force
          Copy-Item -LiteralPath $podcastScript -Destination (Join-Path $tempDir "$env:EPISODE_ID.txt") -Force
          Copy-Item -LiteralPath $podcastManifest -Destination (Join-Path $tempDir "manifest.json") -Force

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          function Invoke-Git {
            & git @args
            if ($LASTEXITCODE -ne 0) {
              throw "git $($args -join ' ') failed with exit code $LASTEXITCODE"
            }
          }

          $branch = if ([string]::IsNullOrWhiteSpace($env:GITHUB_REF_NAME)) { "main" } else { $env:GITHUB_REF_NAME }
          $pushed = $false
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            Write-Host "Archive push attempt $attempt"
            Invoke-Git fetch origin $branch
            Invoke-Git reset --hard "origin/$branch"

            New-Item -ItemType Directory -Force -Path summaries | Out-Null
            New-Item -ItemType Directory -Force -Path "podcast\audio" | Out-Null
            New-Item -ItemType Directory -Force -Path "podcast\scripts" | Out-Null
            Copy-Item -LiteralPath (Join-Path $tempDir $summary.Name) -Destination $archivePath -Force
            Copy-Item -LiteralPath (Join-Path $tempDir "$env:EPISODE_ID.mp3") -Destination $podcastAudio -Force
            Copy-Item -LiteralPath (Join-Path $tempDir "$env:EPISODE_ID.txt") -Destination $podcastScript -Force
            Copy-Item -LiteralPath (Join-Path $tempDir "manifest.json") -Destination $podcastManifest -Force

            Invoke-Git add -- $archivePath $podcastAudio $podcastScript $podcastManifest
            $changes = git status --porcelain -- $archivePath $podcastAudio $podcastScript $podcastManifest
            if ([string]::IsNullOrWhiteSpace($changes)) {
              Write-Host "No summary or podcast changes to archive."
              $pushed = $true
              break
            }

            Invoke-Git commit -m "Archive $env:AGENCY_NAME news summary $env:EPISODE_ID"
            & git push origin "HEAD:$branch"
            if ($LASTEXITCODE -eq 0) {
              $pushed = $true
              break
            }
            Write-Host "git push failed with exit code $LASTEXITCODE. Retrying after syncing latest main."
            Start-Sleep -Seconds 5
          }
          if (-not $pushed) {
            throw "Failed to archive summary after 3 attempts."
          }

      - name: Post article image to KakaoTalk
        if: ${{ github.event.inputs.send_image == 'true' }}
        shell: powershell
        env:
          TARGET_CHATROOM: ${{ github.event.inputs.target_chatroom || vars.TARGET_CHATROOM }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TARGET_CHATROOM)) {
            throw "Repository variable TARGET_CHATROOM or workflow input target_chatroom is required."
          }
          $imagePath = Join-Path "runs" "news-image-$env:EPISODE_ID.png"
          if (!(Test-Path $imagePath)) {
            throw "No article image file found: $imagePath"
          }
          $screenshotPath = Join-Path "runs" "kakao-image-post-$env:EPISODE_ID.png"
          & $env:PYTHON_EXE scripts/post_kakao_image_attach.py --room "$env:TARGET_CHATROOM" --image "$imagePath" --screenshot "$screenshotPath"

      - name: Post summary to KakaoTalk
        if: ${{ github.event.inputs.send_summary == 'true' }}
        shell: powershell
        env:
          TARGET_CHATROOM: ${{ github.event.inputs.target_chatroom || vars.TARGET_CHATROOM }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TARGET_CHATROOM)) {
            throw "Repository variable TARGET_CHATROOM is required."
          }
          $summaryPath = Join-Path "runs" "summary-$env:EPISODE_ID.md"
          if (!(Test-Path $summaryPath)) {
            throw "No summary Markdown file found: $summaryPath"
          }
          $mcpCommand = Join-Path (Split-Path -Parent $env:PYTHON_EXE) "Scripts\kakaotalk-mcp.exe"
          if (!(Test-Path $mcpCommand)) {
            throw "kakaotalk-mcp executable was not found: $mcpCommand"
          }
          & $env:PYTHON_EXE scripts/post_summary_mcp.py --room "$env:TARGET_CHATROOM" --summary "$summaryPath" --mcp-command "$mcpCommand" --verify

      - name: Post podcast link to KakaoTalk
        if: ${{ github.event.inputs.send_podcast == 'true' }}
        shell: powershell
        env:
          TARGET_CHATROOM: ${{ github.event.inputs.target_chatroom || vars.TARGET_CHATROOM }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TARGET_CHATROOM)) {
            throw "Repository variable TARGET_CHATROOM is required."
          }
          $messagePath = Join-Path "runs" "podcast-message-$env:EPISODE_ID.txt"
          if (!(Test-Path $messagePath)) {
            throw "No podcast message file found: $messagePath"
          }
          $mcpCommand = Join-Path (Split-Path -Parent $env:PYTHON_EXE) "Scripts\kakaotalk-mcp.exe"
          if (!(Test-Path $mcpCommand)) {
            throw "kakaotalk-mcp executable was not found: $mcpCommand"
          }
          & $env:PYTHON_EXE scripts/post_summary_mcp.py --room "$env:TARGET_CHATROOM" --summary "$messagePath" --mcp-command "$mcpCommand" --verify

      - name: Write run summary
        if: always()
        shell: powershell
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Agency Kakao dispatch" -Encoding UTF8
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "" -Encoding UTF8
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Trigger source: $env:TRIGGER_SOURCE" -Encoding UTF8
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Agency: $env:AGENCY_NAME" -Encoding UTF8
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Agency index: $env:AGENCY_INDEX" -Encoding UTF8
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Target date: $env:TARGET_DATE_RESOLVED" -Encoding UTF8
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Episode id: $env:EPISODE_ID" -Encoding UTF8
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Weather location: $env:WEATHER_LOCATION" -Encoding UTF8

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agency-news-runs-${{ env.EPISODE_ID }}
          path: runs/
