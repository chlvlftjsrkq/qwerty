name: Daily MMA News Kakao Post via MCP

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Summary date in YYYY-MM-DD. Leave blank for yesterday in KST."
        required: false
        default: ""
  schedule:
    # 08:00 KST
    - cron: "0 23 * * *"

permissions:
  contents: write

jobs:
  post:
    runs-on: [self-hosted, Windows, X64, kakao, qwerty]
    timeout-minutes: 20
    env:
      PYTHON_EXE: ${{ vars.PYTHON_EXE || 'C:\Users\April\.cache\codex-runtimes\codex-primary-runtime\dependencies\python\python.exe' }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify local Python
        shell: powershell
        run: '& $env:PYTHON_EXE --version'

      - name: Install dependencies
        shell: powershell
        run: |
          & $env:PYTHON_EXE -m pip install --upgrade pip
          & $env:PYTHON_EXE -m pip install -r requirements.txt
          & $env:PYTHON_EXE -m pip install "git+https://github.com/kronenz/kakaotalk-mcp.git@master"

      - name: Build Naver news summary
        shell: powershell
        env:
          SUMMARY_PROVIDER: ${{ vars.SUMMARY_PROVIDER || 'codex' }}
          CODEX_COMMAND: ${{ vars.CODEX_COMMAND || 'C:\Users\April\AppData\Roaming\npm\codex.cmd' }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL || '' }}
          CODEX_TIMEOUT_SECONDS: ${{ vars.CODEX_TIMEOUT_SECONDS || '300' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          NAVER_NEWS_ENABLED: "true"
          GOOGLE_NEWS_ENABLED: "false"
          POLICY_RSS_ENABLED: "false"
          KSKILL_PROXY_BASE_URL: ${{ vars.KSKILL_PROXY_BASE_URL || 'https://k-skill-proxy.nomadamas.org' }}
        run: |
          $argsList = @("-m", "kakao_mma_news", "--dry-run")
          if ("${{ inputs.target_date }}" -ne "") {
            $argsList += @("--date", "${{ inputs.target_date }}")
          }
          & $env:PYTHON_EXE @argsList

      - name: Archive summary to repository
        shell: powershell
        run: |
          $summary = Get-ChildItem -Path runs -Filter "summary-*.md" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $summary) {
            throw "No summary Markdown file found in runs/."
          }
          New-Item -ItemType Directory -Force -Path summaries | Out-Null
          $archivePath = Join-Path "summaries" $summary.Name
          Copy-Item -LiteralPath $summary.FullName -Destination $archivePath -Force

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- $archivePath

          $changes = git status --porcelain -- $archivePath
          if ([string]::IsNullOrWhiteSpace($changes)) {
            Write-Host "No summary changes to archive."
          } else {
            $summaryDate = $summary.BaseName -replace "^summary-", ""
            git commit -m "Archive MMA news summary $summaryDate"
            $branch = if ([string]::IsNullOrWhiteSpace($env:GITHUB_REF_NAME)) { "main" } else { $env:GITHUB_REF_NAME }
            git fetch origin $branch
            git rebase "origin/$branch"
            git push origin "HEAD:$branch"
          }

      - name: Post summary to KakaoTalk
        shell: powershell
        env:
          TARGET_CHATROOM: ${{ vars.TARGET_CHATROOM }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TARGET_CHATROOM)) {
            throw "Repository variable TARGET_CHATROOM is required."
          }
          $summary = Get-ChildItem -Path runs -Filter "summary-*.md" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $summary) {
            throw "No summary Markdown file found in runs/."
          }
          $mcpCommand = Join-Path (Split-Path -Parent $env:PYTHON_EXE) "Scripts\kakaotalk-mcp.exe"
          if (!(Test-Path $mcpCommand)) {
            throw "kakaotalk-mcp executable was not found: $mcpCommand"
          }
          & $env:PYTHON_EXE scripts/post_summary_mcp.py --room "$env:TARGET_CHATROOM" --summary "$($summary.FullName)" --mcp-command "$mcpCommand" --verify

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mma-news-runs
          path: runs/
