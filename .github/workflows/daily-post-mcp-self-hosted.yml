name: Daily MMA News Kakao Post via MCP

on:
  schedule:
    # TEMP actual Kakao delivery test: every 5 minutes, offset from busy :00/:05 boundaries.
    # Restore to "7 23 * * *" after scheduled Kakao delivery is confirmed.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"

permissions:
  contents: write

jobs:
  post:
    runs-on: [self-hosted, Windows, X64, kakao, qwerty]
    timeout-minutes: 20
    concurrency:
      group: daily-mma-news-kakao-post
      cancel-in-progress: false
    env:
      PYTHON_EXE: ${{ vars.PYTHON_EXE || 'C:\Users\April\.cache\codex-runtimes\codex-primary-runtime\dependencies\python\python.exe' }}
      TARGET_DATE_INPUT: ""
    steps:
      - uses: actions/checkout@v4

      - name: Verify local Python
        shell: powershell
        run: '& $env:PYTHON_EXE --version'

      - name: Install dependencies
        shell: powershell
        run: |
          & $env:PYTHON_EXE -m pip install --upgrade pip
          & $env:PYTHON_EXE -m pip install -r requirements.txt
          & $env:PYTHON_EXE -m pip install "git+https://github.com/kronenz/kakaotalk-mcp.git@master"

      - name: Build Naver news summary
        shell: powershell
        env:
          SUMMARY_PROVIDER: ${{ vars.SUMMARY_PROVIDER || 'codex' }}
          CODEX_COMMAND: ${{ vars.CODEX_COMMAND || 'C:\Users\April\AppData\Roaming\npm\codex.cmd' }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL || '' }}
          CODEX_TIMEOUT_SECONDS: ${{ vars.CODEX_TIMEOUT_SECONDS || '300' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          WEATHER_ENABLED: ${{ vars.WEATHER_ENABLED || 'true' }}
          WEATHER_LOCATION: ${{ vars.WEATHER_LOCATION || '서울' }}
          WEATHER_LATITUDE: ${{ vars.WEATHER_LATITUDE || '37.5665' }}
          WEATHER_LONGITUDE: ${{ vars.WEATHER_LONGITUDE || '126.9780' }}
          NAVER_NEWS_ENABLED: "true"
          GOOGLE_NEWS_ENABLED: "false"
          POLICY_RSS_ENABLED: "false"
          KSKILL_PROXY_BASE_URL: ${{ vars.KSKILL_PROXY_BASE_URL || 'https://k-skill-proxy.nomadamas.org' }}
        run: |
          $argsList = @("-m", "kakao_mma_news", "--dry-run")
          if (![string]::IsNullOrWhiteSpace($env:TARGET_DATE_INPUT)) {
            $argsList += @("--date", "$env:TARGET_DATE_INPUT")
          }
          & $env:PYTHON_EXE @argsList

      - name: Build podcast audio
        shell: powershell
        env:
          TTS_PROVIDER: ${{ vars.TTS_PROVIDER || 'edge' }}
          TTS_VOICE: ${{ vars.TTS_VOICE || 'ko-KR-SunHiNeural' }}
          TTS_RATE: ${{ vars.TTS_RATE || '+0%' }}
          TTS_PITCH: ${{ vars.TTS_PITCH || '+0Hz' }}
          TTS_TARGET_MINUTES: ${{ vars.TTS_TARGET_MINUTES || '5' }}
          PODCAST_BASE_URL: ${{ vars.PODCAST_BASE_URL || format('https://{0}.github.io/{1}/podcast/', github.repository_owner, github.event.repository.name) }}
          PODCAST_LISTEN_URL_TEMPLATE: ${{ vars.PODCAST_LISTEN_URL_TEMPLATE || '' }}
        run: |
          $summary = Get-ChildItem -Path runs -Filter "summary-*.md" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $summary) {
            throw "No summary Markdown file found in runs/."
          }
          $summaryDate = $summary.BaseName -replace "^summary-", ""
          & $env:PYTHON_EXE scripts/build_podcast_audio.py --date $summaryDate --summary "$($summary.FullName)" --site-base-url "$env:PODCAST_BASE_URL" --target-minutes "$env:TTS_TARGET_MINUTES"
          if ([string]::IsNullOrWhiteSpace($env:PODCAST_LISTEN_URL_TEMPLATE)) {
            $listenUrl = $env:PODCAST_BASE_URL.TrimEnd("/") + "/?date=$summaryDate"
          } else {
            $listenUrl = $env:PODCAST_LISTEN_URL_TEMPLATE.Replace("{date}", $summaryDate)
          }
          $messagePath = Join-Path "runs" "podcast-message-$summaryDate.txt"
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          $label = [char]::ConvertFromUtf32(0x1F3A7) + " " + [System.Text.Encoding]::UTF8.GetString([Convert]::FromBase64String("7J2M7ISx7JqU7JW9IOuTo+q4sA=="))
          [System.IO.File]::WriteAllText($messagePath, "$label`n$listenUrl", $utf8NoBom)

      - name: Archive summary to repository
        shell: powershell
        run: |
          $summary = Get-ChildItem -Path runs -Filter "summary-*.md" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $summary) {
            throw "No summary Markdown file found in runs/."
          }
          New-Item -ItemType Directory -Force -Path summaries | Out-Null
          $archivePath = Join-Path "summaries" $summary.Name
          Copy-Item -LiteralPath $summary.FullName -Destination $archivePath -Force
          $summaryDate = $summary.BaseName -replace "^summary-", ""
          $podcastAudio = Join-Path "podcast\audio" "$summaryDate.mp3"
          $podcastScript = Join-Path "podcast\scripts" "$summaryDate.txt"
          $podcastManifest = "podcast\manifest.json"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- $archivePath $podcastAudio $podcastScript $podcastManifest

          $changes = git status --porcelain -- $archivePath $podcastAudio $podcastScript $podcastManifest
          if ([string]::IsNullOrWhiteSpace($changes)) {
            Write-Host "No summary or podcast changes to archive."
          } else {
            git commit -m "Archive MMA news summary $summaryDate"
            $branch = if ([string]::IsNullOrWhiteSpace($env:GITHUB_REF_NAME)) { "main" } else { $env:GITHUB_REF_NAME }
            git fetch origin $branch
            git rebase "origin/$branch"
            git push origin "HEAD:$branch"
          }

      - name: Post summary to KakaoTalk
        shell: powershell
        env:
          TARGET_CHATROOM: ${{ vars.TARGET_CHATROOM }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TARGET_CHATROOM)) {
            throw "Repository variable TARGET_CHATROOM is required."
          }
          $summary = Get-ChildItem -Path runs -Filter "summary-*.md" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $summary) {
            throw "No summary Markdown file found in runs/."
          }
          $mcpCommand = Join-Path (Split-Path -Parent $env:PYTHON_EXE) "Scripts\kakaotalk-mcp.exe"
          if (!(Test-Path $mcpCommand)) {
            throw "kakaotalk-mcp executable was not found: $mcpCommand"
          }
          & $env:PYTHON_EXE scripts/post_summary_mcp.py --room "$env:TARGET_CHATROOM" --summary "$($summary.FullName)" --mcp-command "$mcpCommand" --verify

      - name: Post podcast link to KakaoTalk
        shell: powershell
        env:
          TARGET_CHATROOM: ${{ vars.TARGET_CHATROOM }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TARGET_CHATROOM)) {
            throw "Repository variable TARGET_CHATROOM is required."
          }
          $message = Get-ChildItem -Path runs -Filter "podcast-message-*.txt" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($null -eq $message) {
            throw "No podcast message file found in runs/."
          }
          $mcpCommand = Join-Path (Split-Path -Parent $env:PYTHON_EXE) "Scripts\kakaotalk-mcp.exe"
          if (!(Test-Path $mcpCommand)) {
            throw "kakaotalk-mcp executable was not found: $mcpCommand"
          }
          & $env:PYTHON_EXE scripts/post_summary_mcp.py --room "$env:TARGET_CHATROOM" --summary "$($message.FullName)" --mcp-command "$mcpCommand" --verify

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mma-news-runs
          path: runs/
