name: Schedule Smoke Test

on:
  workflow_dispatch:
  schedule:
    # Temporary GitHub schedule smoke test: every 5 minutes, offset from busy :00/:05 boundaries.
    - cron: "4/5 * * * *"

permissions:
  contents: write

concurrency:
  group: schedule-smoke-test
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Record schedule smoke result
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p runs/schedule-smoke
          now_utc="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          stamp="$(date -u +'%Y%m%d-%H%M%S')"
          event_name="${GITHUB_EVENT_NAME}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          cat > "runs/schedule-smoke/latest.json" <<JSON
          {
            "ok": true,
            "workflow": "${GITHUB_WORKFLOW}",
            "event_name": "${event_name}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_number": "${GITHUB_RUN_NUMBER}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "ref_name": "${GITHUB_REF_NAME}",
            "sha": "${GITHUB_SHA}",
            "recorded_at_utc": "${now_utc}",
            "run_url": "${run_url}"
          }
          JSON

          cp "runs/schedule-smoke/latest.json" "runs/schedule-smoke/${stamp}-${event_name}.json"

      - name: Commit smoke result
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f runs/schedule-smoke/

          if git diff --cached --quiet; then
            echo "No smoke result changes to commit."
            exit 0
          fi

          git commit -m "Record schedule smoke test ${GITHUB_RUN_ID}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Write step summary
        shell: bash
        run: |
          {
            echo "### Schedule smoke test"
            echo ""
            echo "- Event: ${GITHUB_EVENT_NAME}"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Result file: runs/schedule-smoke/latest.json"
          } >> "${GITHUB_STEP_SUMMARY}"
